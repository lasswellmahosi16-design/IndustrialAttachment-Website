<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Placements — IAMS</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script>
let currentUser;

document.addEventListener('DOMContentLoaded', async () => {
  const u = Auth.require('coordinator');
  if (!u) return;
  currentUser = initAppShell('Placements');
  if (!currentUser) return;
  await renderPlacements();
});

async function renderPlacements() {
  const [placements, students, orgs] = await Promise.all([getPlacements(), getStudents(), getOrganizations()]);
  const el = document.getElementById('pageContent');

  const rows = placements.map(p=>{
    const s = students.find(x=>x.id===p.student_id);
    const o = orgs.find(x=>x.id===p.org_id);
    const init = (s?.full_name||'S')[0].toUpperCase();
    const confirmBtn = currentUser?.role==='coordinator' && p.status!=='confirmed'
      ? `<button class="btn btn-success btn-sm" onclick="confirm_('${p.id}')">✓ Confirm</button>`
      : p.status==='confirmed' ? '<span class="text-xs text-muted">Done</span>' : '';
    return `<tr>
      <td><div class="d-flex align-center gap-2"><div class="av">${init}</div><strong>${s?.full_name||'Unknown'}</strong></div></td>
      <td><code class="code-badge">${s?.student_id||'—'}</code></td>
      <td><span class="text-strong">${o?.org_name||'Unknown'}</span></td>
      <td class="text-sm text-muted">${o?.industry||'—'}</td>
      <td><div class="score-wrap"><div class="score-bar"><div class="score-fill" style="width:${p.score}%"></div></div><span class="score-num">${p.score}%</span></div></td>
      <td><span class="badge ${p.status==='confirmed'?'badge-green':'badge-amber'}">${p.status==='confirmed'?'Confirmed':'Pending'}</span></td>
      ${currentUser?.role==='coordinator'?`<td>${confirmBtn}</td>`:''}
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div class="page-header">
      <div class="page-header-left"><h1>Placement Results</h1><p>${placements.length} placement(s) recorded</p></div>
      <a href="match.html" class="btn btn-outline btn-sm">← Back to Matching</a>
    </div>
    <div id="alertBox"></div>
    ${placements.length ? `
    <div class="table-wrap">
      <div class="table-header">
        <div class="table-header-title">All Placements</div>
      </div>
      <table>
        <thead><tr><th>Student</th><th>ID</th><th>Organization</th><th>Industry</th><th>Match Score</th><th>Status</th>${currentUser?.role==='coordinator'?'<th>Action</th>':''}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`
    :`<div class="empty"><span class="icon-wrap" style="display:flex;align-items:center;justify-content:center;opacity:0.4;margin-bottom:0.5rem;"><svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></span><h3>No placements yet</h3><p>Run the matching algorithm to generate placements.</p>${currentUser?.role==='coordinator'?'<a href="match.html" class="btn btn-blue mt-3">Run matching</a>':''}</div>`}`;
}

async function confirm_(id) {
  if (currentUser?.role !== 'coordinator') {
    showAlert('alertBox','Unauthorized: only coordinators can confirm placements.','error');
    return;
  }
  await confirmPlacement(id);
  showAlert('alertBox','Placement confirmed.','success');
  await renderPlacements();
}
</script>
</body>
</html>
