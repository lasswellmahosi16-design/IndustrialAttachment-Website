<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Run Matching — IAMS</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const u = initAppShell('Match');
  if (!u) return;
  Auth.require('coordinator');
  await renderMatch();
});

async function renderMatch() {
  const [students, orgs, placements] = await Promise.all([getStudents(), getOrganizations(), getPlacements()]);
  const unmatched  = students.filter(s=>!placements.find(p=>p.student_id===s.id)).length;

  document.getElementById('pageContent').innerHTML = `
    <div class="page-header">
      <div class="page-header-left">
        <h1>Student–Organization Matching</h1>
        <p>Run the algorithm to automatically assign students to organizations.</p>
      </div>
    </div>
    <div id="alertBox"></div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-val blue">${students.length}</div><div class="stat-lbl">Total Students</div></div>
      <div class="stat-card"><div class="stat-val green">${orgs.length}</div><div class="stat-lbl">Organizations</div></div>
      <div class="stat-card"><div class="stat-val amber">${placements.length}</div><div class="stat-lbl">Placed</div></div>
      <div class="stat-card"><div class="stat-val red">${unmatched}</div><div class="stat-lbl">Unmatched</div></div>
    </div>
    <div class="match-main">
      <span class="icon-wrap" style="display:inline-flex;align-items:center;justify-content:center;"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg></span>
      <div>
        <h3>Matching Engine</h3>
        <p>Scores every unmatched student against every available organization and assigns each to their highest-scoring match. Organization capacity is respected — once full, that org is skipped.</p>
        <div class="d-flex gap-2 flex-wrap">
          <button id="runBtn" class="btn btn-primary" onclick="doRun()" ${unmatched===0?'disabled':''}>Run Matching</button>
          <button class="btn btn-danger" onclick="doClear()">Clear All Placements</button>
          <a href="placements.html" class="btn btn-outline">View Results</a>
        </div>
        <p class="text-sm mt-2 ${unmatched===0?'text-green':'text-muted'}">
          ${unmatched===0?'All students have been matched. Clear to re-run.':unmatched+' student(s) ready to be matched.'}
        </p>
      </div>
    </div>
    <div class="algo-card">
      <div class="algo-title">How the score is calculated</div>
      <div class="algo-row">
        <span class="algo-lbl">Skill Overlap</span>
        <div class="algo-bar-bg"><div class="algo-bar-fill algo-fill-blue" style="width:70%"></div></div>
        <span class="algo-pct">70%</span>
      </div>
      <div class="algo-row">
        <span class="algo-lbl">Industry Preference</span>
        <div class="algo-bar-bg"><div class="algo-bar-fill algo-fill-green" style="width:20%"></div></div>
        <span class="algo-pct">20%</span>
      </div>
      <div class="algo-row">
        <span class="algo-lbl">GPA Bonus</span>
        <div class="algo-bar-bg"><div class="algo-bar-fill algo-fill-amber" style="width:10%"></div></div>
        <span class="algo-pct">10%</span>
      </div>
      <div class="divider"></div>
      <p class="text-sm text-muted leading-loose">
        <strong class="text-ink2">Skill score</strong> = (matching skills ÷ org required skills) × 70.
        A <strong class="text-ink2">preference bonus</strong> of 20 is added when the org's industry matches the student's listed preferences.
        A <strong class="text-ink2">GPA bonus</strong> (capped at 10) rewards stronger academic performance.
      </p>
    </div>`;
}

async function doRun() {
  const btn=document.getElementById('runBtn'); if(btn){btn.textContent='Running…';btn.disabled=true;}
  const n = await runMatching();
  showAlert('alertBox', `${n} student(s) successfully matched! <a href="placements.html" class="text-green"><strong>View placements →</strong></a>`, 'success');
  setTimeout(renderMatch, 100);
}

async function doClear() {
  if (!confirm('Clear ALL placements? This cannot be undone.')) return;
  await clearPlacements();
  showAlert('alertBox','All placements cleared.','info');
  await renderMatch();
}
</script>
</body>
</html>
