<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Profile — IAMS</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script>
let currentUser, profileData, profileId;

document.addEventListener('DOMContentLoaded', async () => {
  currentUser = initAppShell('Profile');
  if (!currentUser) return;
  const isNew = new URLSearchParams(window.location.search).get('new');
  await loadProfile();
  if (isNew) setTimeout(()=>showAlert('alertBox','🎉 Account created! Fill in your profile details below.','success'), 300);
});

async function loadProfile() {
  const u = currentUser;
  if (u.role==='student') {
    profileData = await getStudentByUserId(u.id) || {}; profileId = profileData.id;
  } else if (u.role==='organization') {
    profileData = await getOrgByUserId(u.id) || {}; profileId = profileData.id;
  } else {
    profileData = await getCoordByUserId(u.id) || {}; profileId = profileData.id;
  }
  renderProfile();
}

function renderProfile() {
  const u = currentUser; const p = profileData;
  const av = u.role==='student'?'🎓':u.role==='organization'?'🏢':'⚙️';
  const name = p.full_name||p.org_name||u.email.split('@')[0];

  let sidebar = `
    <div class="profile-sidebar">
      <div class="profile-top">
        <div class="profile-av">${av}</div>
        <h3>${name}</h3>
        <p>${u.email}</p>
      </div>
      <div class="profile-info">
        <div class="profile-row"><span class="k">Role</span><span class="v" style="text-transform:capitalize">${u.role}</span></div>
        ${u.role==='student'?`
          <div class="profile-row"><span class="k">Student ID</span><span class="v">${p.student_id||'—'}</span></div>
          <div class="profile-row"><span class="k">Department</span><span class="v">${p.department||'—'}</span></div>
          <div class="profile-row"><span class="k">GPA</span><span class="v" style="color:var(--green)">${p.gpa||'—'}</span></div>
        `:u.role==='organization'?`
          <div class="profile-row"><span class="k">Industry</span><span class="v">${p.industry||'—'}</span></div>
          <div class="profile-row"><span class="k">Positions</span><span class="v">${p.positions||'1'}</span></div>
        `:`
          <div class="profile-row"><span class="k">Staff ID</span><span class="v">${p.staff_id||'—'}</span></div>
          <div class="profile-row"><span class="k">Department</span><span class="v">${p.department||'—'}</span></div>
        `}
      </div>
    </div>`;

  let formBody = '';
  if (u.role==='student') {
    formBody = `
      <div class="form-section-title">Personal Information</div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Full Name</label><input id="f_fullName" class="form-control" value="${p.full_name||''}" placeholder="e.g. Lasswell Mahosi"></div>
        <div class="form-group"><label class="form-label">Student ID</label><input id="f_studentId" class="form-control" value="${p.student_id||''}" placeholder="e.g. 202301477"></div>
        <div class="form-group"><label class="form-label">Phone</label><input id="f_phone" class="form-control" value="${p.phone||''}" placeholder="+267 7X XXX XXX"></div>
        <div class="form-group"><label class="form-label">Department</label><input id="f_department" class="form-control" value="${p.department||''}" placeholder="e.g. Computer Science"></div>
        <div class="form-group"><label class="form-label">GPA (0.00 – 5.00)</label><input id="f_gpa" type="number" step="0.01" min="0" max="5" class="form-control" value="${p.gpa||''}" placeholder="e.g. 3.50"></div>
      </div>
      <div class="form-section-title" style="margin-top:1.25rem">Attachment Preferences</div>
      <div class="form-group"><label class="form-label">Skills</label><input id="f_skills" class="form-control" value="${p.skills||''}" placeholder="e.g. Python, MySQL, JavaScript, HTML"><p class="form-hint">Comma-separated. Matched against organization requirements during placement.</p></div>
      <div class="form-group"><label class="form-label">Industry Preferences</label><input id="f_preferences" class="form-control" value="${p.preferences||''}" placeholder="e.g. Technology, Finance, Healthcare"><p class="form-hint">Comma-separated industry types you prefer for your attachment.</p></div>`;
  } else if (u.role==='organization') {
    formBody = `
      <div class="form-section-title">Organization Details</div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Organization Name</label><input id="f_orgName" class="form-control" value="${p.org_name||''}" placeholder="e.g. Botswana Innovation Hub"></div>
        <div class="form-group"><label class="form-label">Contact Person</label><input id="f_contactPerson" class="form-control" value="${p.contact_person||''}" placeholder="e.g. Jane Doe"></div>
        <div class="form-group"><label class="form-label">Phone</label><input id="f_phone" class="form-control" value="${p.phone||''}" placeholder="+267 3XX XXXX"></div>
        <div class="form-group"><label class="form-label">Industry</label><input id="f_industry" class="form-control" value="${p.industry||''}" placeholder="e.g. Technology"></div>
        <div class="form-group"><label class="form-label">Positions Available</label><input id="f_positions" type="number" min="1" class="form-control" value="${p.positions||'1'}"></div>
      </div>
      <div class="form-section-title" style="margin-top:1.25rem">Placement Requirements</div>
      <div class="form-group"><label class="form-label">Required Skills</label><input id="f_requiredSkills" class="form-control" value="${p.required_skills||''}" placeholder="e.g. Python, SQL, Networking"><p class="form-hint">Comma-separated. Students with matching skills are prioritized in matching.</p></div>
      <div class="form-group"><label class="form-label">Organization Description</label><textarea id="f_description" class="form-control" rows="3" placeholder="Brief description of your organization and what interns will do...">${p.description||''}</textarea></div>`;
  } else {
    formBody = `
      <div class="form-section-title">Coordinator Details</div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Full Name</label><input id="f_fullName" class="form-control" value="${p.full_name||''}" placeholder="e.g. Dr. Thabo Molosiwa"></div>
        <div class="form-group"><label class="form-label">Staff ID</label><input id="f_staffId" class="form-control" value="${p.staff_id||''}" placeholder="e.g. STAFF001"></div>
        <div class="form-group"><label class="form-label">Phone</label><input id="f_phone" class="form-control" value="${p.phone||''}" placeholder="+267 3XX XXXX"></div>
        <div class="form-group"><label class="form-label">Department</label><input id="f_department" class="form-control" value="${p.department||''}" placeholder="e.g. Computer Science"></div>
      </div>`;
  }

  document.getElementById('pageContent').innerHTML = `
    <div class="page-header">
      <div class="page-header-left"><h1>My Profile</h1><p>Keep your information up to date — it's used for matching and management.</p></div>
    </div>
    <div id="alertBox"></div>
    <div class="profile-layout">
      ${sidebar}
      <div class="card">
        <h3 style="margin-bottom:1.25rem">Edit Profile Details</h3>
        ${formBody}
        <div class="divider"></div>
        <div class="d-flex gap-2 flex-wrap">
          <button class="btn btn-primary" id="saveBtn" onclick="saveProfile()">💾 Save Profile</button>
          <a href="dashboard.html" class="btn btn-ghost">Cancel</a>
        </div>
      </div>
    </div>`;
}

function g(id) { return document.getElementById(id)?.value?.trim()||''; }

async function saveProfile() {
  const u = currentUser;
  const btn = document.getElementById('saveBtn');
  if(btn){btn.textContent='Saving…';btn.disabled=true;}
  try {
    if (u.role==='student') {
      await saveStudentProfile(u.id, {full_name:g('f_fullName'),student_id:g('f_studentId'),phone:g('f_phone'),department:g('f_department'),gpa:g('f_gpa'),skills:g('f_skills'),preferences:g('f_preferences')});
    } else if (u.role==='organization') {
      await saveOrgProfile(u.id, {org_name:g('f_orgName'),contact_person:g('f_contactPerson'),phone:g('f_phone'),industry:g('f_industry'),positions:parseInt(g('f_positions'))||1,required_skills:g('f_requiredSkills'),description:g('f_description')});
    } else {
      await saveCoordProfile(u.id, {full_name:g('f_fullName'),staff_id:g('f_staffId'),phone:g('f_phone'),department:g('f_department')});
    }
    currentUser = Auth.current();
    showAlert('alertBox','✓ Profile saved successfully!','success');
    await loadProfile();
  } catch(err) { showAlert('alertBox','Error: '+err.message,'error'); }
  if(btn){btn.textContent='💾 Save Profile';btn.disabled=false;}
}
</script>
</body>
</html>
