<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>My Placement — IAMS</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const u = initAppShell('My Placement');
  if (!u) return;

  const student = await getStudentByUserId(u.id);
  const [placements, orgs] = await Promise.all([getPlacements(), getOrganizations()]);
  const placement = student ? placements.find(p=>p.student_id===student.id) : null;
  const org        = placement ? orgs.find(o=>o.id===placement.org_id) : null;
  const el         = document.getElementById('pageContent');

  el.innerHTML = `
    <div class="page-header">
      <div class="page-header-left">
        <h1>My Placement</h1>
        <p>Your industrial attachment allocation result</p>
      </div>
    </div>`;

  if (!placement || !org) {
    el.innerHTML += `
      <div class="empty">
        <span class="icon-wrap" style="display:flex;align-items:center;justify-content:center;opacity:0.4;margin-bottom:0.5rem;"><svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></span>
        <h3>Not matched yet</h3>
        <p>You haven't been matched to an organization yet.<br>The coordinator will run the matching algorithm soon.</p>
        <div class="d-flex gap-2 mt-3 flex-center flex-wrap">
          <a href="dashboard.html" class="btn btn-outline">← Dashboard</a>
          <a href="organizations.html" class="btn btn-blue">Browse Organizations</a>
        </div>
      </div>`;
    return;
  }

  const date = new Date(placement.created_at).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
  const skills = split(org.required_skills);

  el.innerHTML += `
    <div class="placement-card">
      <div class="placement-accent"></div>
      <div class="placement-body">
        <div class="placement-top">
          <div class="placement-org">
            <h2>${org.org_name}</h2>
            <p>${org.industry||'Industry not specified'}</p>
          </div>
          <span class="badge ${placement.status==='confirmed'?'badge-green':'badge-amber'}">
            ${placement.status==='confirmed'?'Confirmed':'Awaiting confirmation'}
          </span>
        </div>

        <div class="placement-score-row">
          <div class="placement-score-n">${placement.score}%</div>
          <div class="placement-score-right">
            <div class="placement-score-lbl">Match Score</div>
            <div class="score-bar sm"><div class="score-fill" style="width:${placement.score}%"></div></div>
        <div class="placement-meta">
          <div class="pmeta-item"><div class="k">Contact Person</div><div class="v">${org.contact_person||'—'}</div></div>
          <div class="pmeta-item"><div class="k">Phone</div><div class="v">${org.phone||'—'}</div></div>
          <div class="pmeta-item"><div class="k">Industry</div><div class="v">${org.industry||'—'}</div></div>
          <div class="pmeta-item"><div class="k">Positions Available</div><div class="v">${org.positions||'1'}</div></div>
          <div class="pmeta-item"><div class="k">Matched On</div><div class="v">${date}</div></div>
          <div class="pmeta-item"><div class="k">Status</div><div class="v"><span class="badge ${placement.status==='confirmed'?'badge-green':'badge-amber'}">${placement.status}</span></div></div>
        </div>

        ${org.description?`<div class="divider"></div><p class="text-xs text-muted mb-2 text-uppercase">About the Organization</p><p class="text-sm text-ink2 leading-loose">${org.description}</p>`:''}

        ${skills.length?`<div class="divider"></div><p class="text-xs text-muted mb-2 text-uppercase">Required Skills</p><div class="tags">${skills.map(s=>`<span class="tag">${s}</span>`).join('')}</div>`:''}

        <div class="divider"></div>
        <a href="dashboard.html" class="btn btn-outline btn-sm">← Back to Dashboard</a>
      </div>
    </div>`;
});
</script>
</body>
</html>
