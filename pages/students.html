<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Students — IAMS</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script>
let allStudents=[], allPlacements=[], allOrgs=[];

document.addEventListener('DOMContentLoaded', async () => {
  const u = initAppShell('Students');
  if (!u) return;
  Auth.require('coordinator');
  [allStudents, allPlacements, allOrgs] = await Promise.all([getStudents(), getPlacements(), getOrganizations()]);
  render(allStudents);
});

function filter() {
  const q = document.getElementById('srch').value.toLowerCase();
  render(q ? allStudents.filter(s=>[s.full_name,s.student_id,s.department,s.skills,s.preferences].join(' ').toLowerCase().includes(q)) : allStudents);
}

function render(students) {
  const el = document.getElementById('pageContent');
  const rows = students.map(s=>{
    const p = allPlacements.find(x=>x.studentId===s.id);
    const o = p ? allOrgs.find(x=>x.id===p.orgId) : null;
    const init = (s.full_name||'S')[0].toUpperCase();
    const tags = split(s.skills).slice(0,4).map(sk=>`<span class="tag">${sk}</span>`).join('');
    const extra = split(s.skills).length>4 ? `<span class="tag">+${split(s.skills).length-4}</span>` : '';
    return `<tr>
      <td><div class="d-flex align-center gap-2"><div class="av">${init}</div><strong>${s.full_name||'—'}</strong></div></td>
      <td><code style="font-size:.75rem;color:var(--muted);background:var(--cream2);padding:2px 7px;border-radius:4px">${s.student_id}</code></td>
      <td>${s.department||'—'}</td>
      <td><strong style="color:var(--green)">${s.gpa||'—'}</strong></td>
      <td><div class="tags">${tags}${extra}${!s.skills?'<span class="text-muted text-xs">None</span>':''}</div></td>
      <td>${p&&o?`<span class="badge badge-green">✓ ${o.orgName}</span>`:'<span class="badge badge-amber">⏳ Unmatched</span>'}</td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div class="page-header">
      <div class="page-header-left"><h1>Registered Students</h1><p>${students.length} student(s) found</p></div>
    </div>
    <div class="table-wrap">
      <div class="table-header">
        <div class="table-header-title">All Students</div>
        <div class="table-search-wrap">
          <span class="table-search-icon">🔍</span>
          <input id="srch" class="table-search" placeholder="Search name, ID, skills…" oninput="filter()">
        </div>
      </div>
      <table>
        <thead><tr><th>Student</th><th>ID</th><th>Department</th><th>GPA</th><th>Skills</th><th>Placement</th></tr></thead>
        <tbody>${rows||`<tr><td colspan="6"><div class="empty"><div class="empty-icon">🎓</div><h3>No students found</h3></div></td></tr>`}</tbody>
      </table>
    </div>`;
}
</script>
</body>
</html>
